<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Abstract handshake — two angular arms meeting in the center -->
  <!-- Left arm (navy) -->
  <path d="M 60,320 L 160,320 L 220,240 L 280,280"
        fill="none" stroke="#1e3a5f" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right arm (gold) -->
  <path d="M 452,320 L 352,320 L 292,240 L 232,280"
        fill="none" stroke="#d4930d" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Overlap clasp point -->
  <circle cx="256" cy="260" r="24" fill="#1e3a5f"/>
  <circle cx="256" cy="260" r="14" fill="#f0b429"/>
  <!-- Wordmark -->
  <text x="256" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700"
        font-size="72" fill="#1e3a5f" text-anchor="middle" letter-spacing="12">PACT</text>
</svg>
