version: '3'

vars:
  BUILD_DIR: build
  PACTC: build/pactc
  VERSION:
    sh: cat VERSION | tr -d '\n'

tasks:
  bootstrap:
    desc: Build compiler from bootstrap and verify self-hosting
    cmds:
      - ./bootstrap/bootstrap.sh

  regen:
    desc: Regenerate bootstrap C from source and verify self-hosting
    cmds:
      - '{{.PACTC}} src/pactc_main.pact bootstrap/pactc_bootstrap.c'
      - ./bootstrap/bootstrap.sh

  compile-test:
    desc: "Compile a single test file (usage: task compile-test -- test_name)"
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/pact build examples/{{.CLI_ARGS}}.pact'

  test:
    desc: Compile and run all test_*.pact files
    deps: [build-cli]
    cmds:
      - |
        passed=0
        failed=0
        errors=""
        for f in examples/test_*.pact; do
          name=$(basename "$f" .pact)
          if ! {{.BUILD_DIR}}/pact build "$f" 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (build) ${name}"
            continue
          fi
          if output=$({{.BUILD_DIR}}/${name} 2>&1); then
            if echo "$output" | grep -q "FAIL"; then
              failed=$((failed + 1))
              errors="${errors}\n  FAIL (assert) ${name}"
            else
              passed=$((passed + 1))
            fi
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (crash)  ${name}"
          fi
        done
        echo "${passed} passed, ${failed} failed"
        if [ $failed -gt 0 ]; then
          printf "Failures:${errors}\n"
          exit 1
        fi

  build-cli:
    desc: Build the pact CLI tool
    deps: [bootstrap]
    cmds:
      - '{{.PACTC}} src/cli.pact {{.BUILD_DIR}}/cli.c'
      - sed -i 's/pact_cli_version = "dev"/pact_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
      - 'cc -o {{.BUILD_DIR}}/pact {{.BUILD_DIR}}/cli.c -lm'
      - echo "CLI built at {{.BUILD_DIR}}/pact ({{.VERSION}}-dev)"

  build:
    desc: Build and install pact to ~/.local/bin/
    deps: [build-cli]
    cmds:
      - mkdir -p ~/.local/bin
      - cp {{.BUILD_DIR}}/pact ~/.local/bin/pact
      - echo "Installed pact to ~/.local/bin/pact"

  test-fmt:
    desc: Test formatter idempotency and golden outputs
    deps: [bootstrap]
    cmds:
      - mkdir -p .tmp
      - |
        passed=0
        failed=0
        skipped=0
        errors=""

        # Known formatter issues (skip idempotency/semantic checks)
        fmt_skip="test_hof test_lazy_iter test_semver test_toml test_manifest test_lockfile test_http_types test_http_error test_json test_json_builder test_args test_args_cli test_derive_serialize test_derive_enum test_derive_nested test_derive_deserialize test_derive_enum_deser test_embed test_combining_iterators"

        # Golden output tests: compare formatter output against expected
        for input in tests/fmt/input_*.pact; do
          name=$(basename "$input" .pact | sed 's/^input_//')
          expected="tests/fmt/expected_${name}.pact"
          if [ ! -f "$expected" ]; then
            continue
          fi
          actual=$(mktemp .tmp/fmt-XXXXXX)
          if ! {{.PACTC}} "$input" "$actual" --emit pact 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (format) golden_${name}"
            rm -f "$actual"
            continue
          fi
          if diff -u "$expected" "$actual" >/dev/null 2>&1; then
            passed=$((passed + 1))
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (golden) ${name}"
            diff -u "$expected" "$actual" | head -20
          fi
          rm -f "$actual"
        done

        # Idempotency: format(format(x)) == format(x) for all example files
        for f in examples/test_*.pact; do
          name=$(basename "$f" .pact)
          if echo "$fmt_skip" | grep -qw "$name"; then skipped=$((skipped + 1)); continue; fi
          fmt1=$(mktemp .tmp/fmt-XXXXXX)
          fmt2=$(mktemp .tmp/fmt-XXXXXX)
          if ! {{.PACTC}} "$f" "$fmt1" --emit pact 2>/dev/null; then
            skipped=$((skipped + 1))
            rm -f "$fmt1" "$fmt2"
            continue
          fi
          if ! {{.PACTC}} "$fmt1" "$fmt2" --emit pact 2>/dev/null; then
            skipped=$((skipped + 1))
            rm -f "$fmt1" "$fmt2"
            continue
          fi
          if diff -q "$fmt1" "$fmt2" >/dev/null 2>&1; then
            passed=$((passed + 1))
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (idempotent) ${name}"
          fi
          rm -f "$fmt1" "$fmt2"
        done

        # Semantic: formatted output still compiles and passes
        for f in examples/test_*.pact; do
          name=$(basename "$f" .pact)
          if echo "$fmt_skip" | grep -qw "$name"; then skipped=$((skipped + 1)); continue; fi
          fmt_src=$(mktemp .tmp/fmt-XXXXXX.pact)
          fmt_c=$(mktemp .tmp/fmt-XXXXXX.c)
          fmt_bin=$(mktemp .tmp/fmt-XXXXXX)
          if ! {{.PACTC}} "$f" "$fmt_src" --emit pact 2>/dev/null; then
            skipped=$((skipped + 1))
            rm -f "$fmt_src" "$fmt_c" "$fmt_bin"
            continue
          fi
          if ! {{.PACTC}} "$fmt_src" "$fmt_c" 2>/dev/null; then
            skipped=$((skipped + 1))
            rm -f "$fmt_src" "$fmt_c" "$fmt_bin"
            continue
          fi
          if ! cc -o "$fmt_bin" "$fmt_c" -I bootstrap -lm 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (cc) ${name}"
            rm -f "$fmt_src" "$fmt_c" "$fmt_bin"
            continue
          fi
          if output=$("$fmt_bin" 2>&1); then
            if echo "$output" | grep -q "FAIL"; then
              failed=$((failed + 1))
              errors="${errors}\n  FAIL (assert) fmt_${name}"
            else
              passed=$((passed + 1))
            fi
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (crash) fmt_${name}"
          fi
          rm -f "$fmt_src" "$fmt_c" "$fmt_bin"
        done

        echo "fmt: ${passed} passed, ${failed} failed, ${skipped} skipped"
        if [ $failed -gt 0 ]; then
          printf "Failures:${errors}\n"
          exit 1
        fi

  ci:
    desc: Full CI — regen bootstrap + run all tests
    cmds:
      - task: regen
      - task: test
      - task: test-fmt

  clean-tmp:
    desc: Remove all temp files from .tmp/
    cmds:
      - find .tmp -type f ! -name '.gitkeep' -delete 2>/dev/null || true

  build-binaries:
    desc: Cross-compile pact CLI binaries for all platforms
    deps: [build-cli]
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - sed -i 's/pact_cli_version = "[^"]*"/pact_cli_version = "{{.VERSION}}"/' {{.BUILD_DIR}}/cli.c
      - zig cc -O2 -target x86_64-linux-gnu -o {{.BUILD_DIR}}/pact-linux-x86_64 {{.BUILD_DIR}}/cli.c -lm
      - zig cc -O2 -target x86_64-macos -o {{.BUILD_DIR}}/pact-macos-x86_64 {{.BUILD_DIR}}/cli.c -lm
      - zig cc -O2 -target aarch64-macos -o {{.BUILD_DIR}}/pact-macos-aarch64 {{.BUILD_DIR}}/cli.c -lm
      - echo "Built binaries for linux-x86_64, macos-x86_64, macos-aarch64 ({{.VERSION}})"

  release:
    desc: "Create a GitHub release (usage: task release -- v0.5.0)"
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Version required. Usage: task release -- v0.5.0"
      - sh: echo "{{.CLI_ARGS}}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'
        msg: "Version must match vX.Y.Z format (e.g. v0.5.0)"
      - sh: test "v{{.VERSION}}" = "{{.CLI_ARGS}}"
        msg: "Tag {{.CLI_ARGS}} does not match VERSION file (v{{.VERSION}}). Update VERSION first."
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory must be clean. Commit or stash changes first."
    cmds:
      - task: ci
      - task: build-binaries
      - git tag {{.CLI_ARGS}}
      - git push origin {{.CLI_ARGS}}
      - |
        gh release create {{.CLI_ARGS}} \
          {{.BUILD_DIR}}/pact-linux-x86_64 \
          {{.BUILD_DIR}}/pact-macos-x86_64 \
          {{.BUILD_DIR}}/pact-macos-aarch64 \
          llms-full.md \
          --title "{{.CLI_ARGS}}" \
          --generate-notes
      - echo "Released {{.CLI_ARGS}} — https://github.com/nhumrich/pact/releases/tag/{{.CLI_ARGS}}"
