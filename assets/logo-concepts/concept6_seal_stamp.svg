<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="seal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#162d4a"/>
    </linearGradient>
  </defs>
  <!-- Wax seal / stamp concept — a pact is sealed -->
  <!-- Outer seal ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1e3a5f" stroke-width="8"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1e3a5f" stroke-width="3"/>
  <!-- Inner filled circle -->
  <circle cx="256" cy="256" r="160" fill="url(#seal)"/>
  <!-- Decorative notches around the seal -->
  <g fill="#d4930d">
    <rect x="252" y="60" width="8" height="24" rx="4"/>
    <rect x="252" y="428" width="8" height="24" rx="4"/>
    <rect x="60" y="252" width="24" height="8" rx="4"/>
    <rect x="428" y="252" width="24" height="8" rx="4"/>
    <!-- Diagonals -->
    <rect x="117" y="115" width="8" height="24" rx="4" transform="rotate(45 121 127)"/>
    <rect x="387" y="115" width="8" height="24" rx="4" transform="rotate(-45 391 127)"/>
    <rect x="117" y="373" width="8" height="24" rx="4" transform="rotate(-45 121 385)"/>
    <rect x="387" y="373" width="8" height="24" rx="4" transform="rotate(45 391 385)"/>
  </g>
  <!-- P letterform inside seal -->
  <text x="256" y="300" font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="200" fill="#d4930d" text-anchor="middle" opacity="0.9">P</text>
  <!-- Ring text -->
  <path id="topArc" d="M 116,256 A 140,140 0 0,1 396,256" fill="none"/>
  <text font-family="'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#d4930d" letter-spacing="8">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">PACT LANGUAGE</textPath>
  </text>
</svg>
