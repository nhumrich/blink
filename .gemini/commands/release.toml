description = "Prepare and ship a Pact version release."
prompt = """
1. **Determine Changes**: Check `git log` since last tag. Classify as breaking, feature, or fix.
2. **Confirm Version**: Show current version and recommend next semver bump.
3. **Bump VERSION**: Update the `VERSION` file.
4. **Update Docs**: Update `llms.md` and `llms-full.md` with recent changes and new builtins/methods.
5. **Commit Prep**: Stage changes and commit as "Prepare vX.Y.Z release".
6. **Push**: `git push origin main`.
7. **Execute Release**: Run `task release -- vX.Y.Z`.
8. **Verify**: Run `gh release view vX.Y.Z`.

{{args}}
"""
