<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Cleaner take — } as solid path forming P, > as gold accent -->

  <!-- P stem (straight down from the brace's lower half) -->
  <rect x="116" y="60" width="48" height="392" rx="4" fill="#1e3a5f"/>

  <!-- P bowl — the "}" curve going right and back -->
  <path d="M 140,60
           L 260,60
           Q 360,60 360,160
           Q 360,260 260,260
           L 140,260"
        fill="none" stroke="#1e3a5f" stroke-width="48" stroke-linejoin="round" stroke-linecap="butt"/>

  <!-- } middle notch — the characteristic brace bump pointing right -->
  <path d="M 140,340 L 190,340 Q 210,340 210,360 Q 210,380 190,380 L 140,380"
        fill="none" stroke="#1e3a5f" stroke-width="24" stroke-linecap="round"/>

  <!-- > chevron inside the P bowl -->
  <path d="M 200,112 L 290,160 L 200,208"
        fill="none" stroke="#d4930d" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
