version: '3'

vars:
  BUILD_DIR: build
  PACTC: build/pactc

tasks:
  bootstrap:
    desc: Build compiler from bootstrap and verify self-hosting
    cmds:
      - ./bootstrap/bootstrap.sh

  compile-test:
    desc: "Compile a single test file (usage: task compile-test -- test_name)"
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/pact build examples/{{.CLI_ARGS}}.pact'

  test:
    desc: Compile and run all test_*.pact files
    deps: [build-cli]
    cmds:
      - |
        passed=0
        failed=0
        errors=""
        for f in examples/test_*.pact; do
          name=$(basename "$f" .pact)
          if ! {{.BUILD_DIR}}/pact build "$f" 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (build) ${name}"
            continue
          fi
          if output=$({{.BUILD_DIR}}/${name} 2>&1); then
            if echo "$output" | grep -qi "FAIL"; then
              failed=$((failed + 1))
              errors="${errors}\n  FAIL (assert) ${name}"
            else
              passed=$((passed + 1))
            fi
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (crash)  ${name}"
          fi
        done
        echo "${passed} passed, ${failed} failed"
        if [ $failed -gt 0 ]; then
          printf "Failures:${errors}\n"
          exit 1
        fi

  build-cli:
    desc: Build the pact CLI tool
    deps: [bootstrap]
    cmds:
      - '{{.PACTC}} src/cli.pact {{.BUILD_DIR}}/cli.c'
      - 'cc -o {{.BUILD_DIR}}/pact {{.BUILD_DIR}}/cli.c -lm'
      - echo "CLI built at {{.BUILD_DIR}}/pact"

  ci:
    desc: Full CI — bootstrap + run all tests
    cmds:
      - task: bootstrap
      - task: test

  build-binaries:
    desc: Cross-compile bootstrap binaries for all platforms
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - zig cc -O2 -target x86_64-linux-gnu -o {{.BUILD_DIR}}/pactc-linux-x86_64 bootstrap/pactc_bootstrap.c -lm
      - zig cc -O2 -target x86_64-macos -o {{.BUILD_DIR}}/pactc-macos-x86_64 bootstrap/pactc_bootstrap.c -lm
      - zig cc -O2 -target aarch64-macos -o {{.BUILD_DIR}}/pactc-macos-aarch64 bootstrap/pactc_bootstrap.c -lm
      - echo "Built binaries for linux-x86_64, macos-x86_64, macos-aarch64"

  release:
    desc: "Create a GitHub release (usage: task release -- v0.5.0)"
    deps: [ci, build-binaries]
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Version required. Usage: task release -- v0.5.0"
      - sh: echo "{{.CLI_ARGS}}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'
        msg: "Version must match vX.Y.Z format (e.g. v0.5.0)"
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory must be clean. Commit or stash changes first."
    vars:
      VERSION: "{{.CLI_ARGS}}"
    cmds:
      - git tag {{.VERSION}}
      - git push origin {{.VERSION}}
      - |
        gh release create {{.VERSION}} \
          {{.BUILD_DIR}}/pactc-linux-x86_64 \
          {{.BUILD_DIR}}/pactc-macos-x86_64 \
          {{.BUILD_DIR}}/pactc-macos-aarch64 \
          bootstrap/pactc_bootstrap.c \
          bootstrap/runtime.h \
          bootstrap/bootstrap.sh \
          --title "{{.VERSION}}" \
          --generate-notes
      - echo "Released {{.VERSION}} — https://github.com/nhumrich/pact/releases/tag/{{.VERSION}}"
