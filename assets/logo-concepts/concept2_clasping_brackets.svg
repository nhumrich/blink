<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Two curly-brace-like shapes clasping together -->
  <!-- Left clasp (navy) -->
  <path d="M 140,100
           Q 100,100 100,150
           L 100,220
           Q 100,256 140,256
           Q 100,256 100,292
           L 100,362
           Q 100,412 140,412"
        fill="none" stroke="#1e3a5f" stroke-width="36" stroke-linecap="round"/>
  <!-- Right clasp (gold) -->
  <path d="M 372,100
           Q 412,100 412,150
           L 412,220
           Q 412,256 372,256
           Q 412,256 412,292
           L 412,362
           Q 412,412 372,412"
        fill="none" stroke="#d4930d" stroke-width="36" stroke-linecap="round"/>
  <!-- Center connection dot -->
  <circle cx="256" cy="256" r="18" fill="#1e3a5f"/>
  <!-- Handshake lines connecting them -->
  <line x1="140" y1="256" x2="236" y2="256" stroke="#1e3a5f" stroke-width="12" stroke-linecap="round"/>
  <line x1="276" y1="256" x2="372" y2="256" stroke="#d4930d" stroke-width="12" stroke-linecap="round"/>
</svg>
