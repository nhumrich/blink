version: '3'

vars:
  BUILD_DIR: build
  PACTC: build/pactc
  JOBS:
    sh: nproc 2>/dev/null || sysctl -n hw.ncpu 2>/dev/null || echo 12
  VERSION:
    sh: cat VERSION | tr -d '\n'

tasks:
  bootstrap:
    desc: Build compiler from bootstrap and verify self-hosting
    sources:
      - bootstrap/runtime*.h
      - bootstrap/bootstrap.sh
      - src/*.pact
      - lib/std/*.pact
      - lib/pkg/*.pact
    generates:
      - '{{.BUILD_DIR}}/pactc'
    cmds:
      - ./bootstrap/bootstrap.sh

  regen:
    desc: Rebuild compiler and verify self-hosting
    cmds:
      - cp -f {{.BUILD_DIR}}/pactc {{.BUILD_DIR}}/pactc.bak 2>/dev/null || true
      - ./bootstrap/bootstrap.sh

  compile-test:
    desc: "Compile a single test file (usage: task compile-test -- test_name)"
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/pact build tests/{{.CLI_ARGS}}.pact'

  test:
    desc: Compile and run all test_*.pact files
    deps: [build-cli]
    cmds:
      - '{{.BUILD_DIR}}/pact test tests/ --parallel {{.JOBS}}'

  build-cli:
    desc: Build the pact CLI tool
    deps: [bootstrap]
    sources:
      - src/*.pact
      - lib/std/*.pact
      - lib/pkg/*.pact
      - '{{.BUILD_DIR}}/pactc'
      - llms.md
      - llms-full.md
      - bootstrap/runtime*.h
      - templates/**
    generates:
      - '{{.BUILD_DIR}}/pact'
    cmds:
      - '{{.PACTC}} src/cli.pact {{.BUILD_DIR}}/cli.c'
      - sed -i 's/pact_cli_version = "dev"/pact_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
      - 'cc -o {{.BUILD_DIR}}/pact {{.BUILD_DIR}}/cli.c -lm -lgc'
      - echo "CLI built at {{.BUILD_DIR}}/pact ({{.VERSION}}-dev)"

  build:
    desc: Build and install pact to ~/.local/bin/
    deps: [build-cli]
    cmds:
      - mkdir -p ~/.local/bin
      - cp {{.BUILD_DIR}}/pact ~/.local/bin/pact
      - echo "Installed pact to ~/.local/bin/pact"

  test-fmt:
    desc: Test formatter idempotency and golden outputs
    deps: [bootstrap]
    cmds:
      - mkdir -p .tmp
      - |
        printf '%s\n' test_hof test_lazy_iter test_semver test_toml test_manifest test_lockfile test_http_types test_http_error test_json test_json_builder test_args test_args_cli test_derive_nested test_embed test_combining_iterators test_http_client test_iterators test_match_void_if test_multifile_visibility test_question_ops test_string_iter test_audit test_e2e_gitdep test_e2e_transitive test_e2e_pub_visibility test_async_spawn_types test_tcp_socket > .tmp/fmt_skip.txt

        golden_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_golden.sh {} {{.PACTC}} ::: tests/fmt/input_*.pact 2>&1 || true)
        idem_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_idempotent.sh {} {{.PACTC}} .tmp/fmt_skip.txt ::: tests/test_*.pact 2>&1 || true)
        sem_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_semantic.sh {} {{.PACTC}} .tmp/fmt_skip.txt ::: tests/test_*.pact 2>&1 || true)

        all_results=$(printf '%s\n%s\n%s' "$golden_results" "$idem_results" "$sem_results")

        passed=$(echo "$all_results" | grep -c "^PASS" || true)
        failed=$(echo "$all_results" | grep -c "^FAIL" || true)
        skipped=$(echo "$all_results" | grep -c "^SKIP" || true)
        echo "fmt: ${passed} passed, ${failed} failed, ${skipped} skipped"
        if [ "$failed" -gt 0 ]; then
          echo "Failures:"
          echo "$all_results" | grep "^FAIL" | sed 's/^/  /'
          exit 1
        fi

  test-installed:
    desc: Test that installed pact works outside project tree
    deps: [build-cli]
    cmds:
      - |
        set -e
        TMPDIR=$(mktemp -d)
        trap "rm -rf $TMPDIR" EXIT
        cp {{.BUILD_DIR}}/pact "$TMPDIR/pact"
        cat > "$TMPDIR/test_standalone.pact" << 'PACT'
        import std.path

        fn main() ! IO {
            let p = path_join("hello", "world")
            io.println(p)
            let s = sb_new()
            sb_write(s, "ok")
            io.println(sb_to_str(s))
        }
        PACT
        OUTPUT=$("$TMPDIR/pact" run "$TMPDIR/test_standalone.pact" 2>/dev/null)
        EXPECTED=$(printf 'hello/world\nok')
        if [ "$OUTPUT" = "$EXPECTED" ]; then
          echo "PASS test-installed"
        else
          echo "FAIL test-installed"
          echo "Expected: $EXPECTED"
          echo "Got: $OUTPUT"
          exit 1
        fi

  ci:
    desc: Full CI — regen bootstrap + run all tests
    silent: true
    sources:
      - src/*.pact
      - lib/std/*.pact
      - lib/pkg/*.pact
      - tests/test_*.pact
      - tests/fmt/**
      - bootstrap/runtime*.h
      - bootstrap/bootstrap.sh
      - scripts/run_fmt_*.sh
    cmds:
      - find .tmp -type f ! -name '.gitkeep' -delete 2>/dev/null || true
      - |
        output=$(./bootstrap/bootstrap.sh 2>&1)
        if echo "$output" | grep -q "Bootstrap verified"; then
          echo "regen: ok"
        else
          echo "$output"
          exit 1
        fi
      - |
        {{.PACTC}} src/cli.pact {{.BUILD_DIR}}/cli.c 2>/dev/null
        sed -i 's/pact_cli_version = "dev"/pact_cli_version = "{{.VERSION}}-dev+'"$(date +%Y%m%d%H%M%S)"'"/' {{.BUILD_DIR}}/cli.c
        cc -o {{.BUILD_DIR}}/pact {{.BUILD_DIR}}/cli.c -lm -lgc
      - '{{.BUILD_DIR}}/pact test tests/ --parallel {{.JOBS}} --quiet'
      - |
        mkdir -p .tmp
        printf '%s\n' test_hof test_lazy_iter test_semver test_toml test_manifest test_lockfile test_http_types test_http_error test_json test_json_builder test_args test_args_cli test_derive_nested test_embed test_combining_iterators test_http_client test_iterators test_match_void_if test_multifile_visibility test_question_ops test_string_iter test_audit test_e2e_gitdep test_e2e_transitive test_e2e_pub_visibility test_async_spawn_types test_tcp_socket > .tmp/fmt_skip.txt

        golden_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_golden.sh {} {{.PACTC}} ::: tests/fmt/input_*.pact 2>&1 || true)
        idem_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_idempotent.sh {} {{.PACTC}} .tmp/fmt_skip.txt ::: tests/test_*.pact 2>&1 || true)
        sem_results=$(parallel -j {{.JOBS}} --halt never ./scripts/run_fmt_semantic.sh {} {{.PACTC}} .tmp/fmt_skip.txt ::: tests/test_*.pact 2>&1 || true)

        all_results=$(printf '%s\n%s\n%s' "$golden_results" "$idem_results" "$sem_results")

        passed=$(echo "$all_results" | grep -c "^PASS" || true)
        failed=$(echo "$all_results" | grep -c "^FAIL" || true)
        skipped=$(echo "$all_results" | grep -c "^SKIP" || true)
        echo "fmt: ${passed} passed, ${failed} failed, ${skipped} skipped"
        if [ "$failed" -gt 0 ]; then
          echo "Failures:"
          echo "$all_results" | grep "^FAIL" | sed 's/^/  /'
          exit 1
        fi
      - |
        set -e
        TMPDIR=$(mktemp -d)
        trap "rm -rf $TMPDIR" EXIT
        cp {{.BUILD_DIR}}/pact "$TMPDIR/pact"
        cat > "$TMPDIR/test_standalone.pact" << 'PACT'
        import std.path

        fn main() ! IO {
            let p = path_join("hello", "world")
            io.println(p)
            let s = sb_new()
            sb_write(s, "ok")
            io.println(sb_to_str(s))
        }
        PACT
        OUTPUT=$("$TMPDIR/pact" run "$TMPDIR/test_standalone.pact" 2>/dev/null)
        EXPECTED=$(printf 'hello/world\nok')
        if [ "$OUTPUT" = "$EXPECTED" ]; then
          echo "test-installed: ok"
        else
          echo "FAIL test-installed"
          echo "Expected: $EXPECTED"
          echo "Got: $OUTPUT"
          exit 1
        fi

  clean-tmp:
    desc: Remove all temp files from .tmp/
    cmds:
      - find .tmp -type f ! -name '.gitkeep' -delete 2>/dev/null || true

  build-binaries:
    desc: Cross-compile pact CLI binaries for all platforms
    deps: [build-cli]
    cmds:
      - bin/pact build src/cli.pact --emit c
      - sed -i 's/pact_cli_version = "[^"]*"/pact_cli_version = "{{.VERSION}}"/' {{.BUILD_DIR}}/cli.c
      - zig cc -O2 -Wno-parentheses-equality -target x86_64-linux-gnu -o {{.BUILD_DIR}}/pact-linux-x86_64 {{.BUILD_DIR}}/cli.c -lm
      - zig cc -O2 -Wno-parentheses-equality -target x86_64-macos -o {{.BUILD_DIR}}/pact-macos-x86_64 {{.BUILD_DIR}}/cli.c -lm
      - zig cc -O2 -Wno-parentheses-equality -target aarch64-macos -o {{.BUILD_DIR}}/pact-macos-aarch64 {{.BUILD_DIR}}/cli.c -lm
      - echo "Built binaries for linux-x86_64, macos-x86_64, macos-aarch64 ({{.VERSION}})"

  release:
    desc: "Create a GitHub release (usage: task release -- v0.5.0)"
    preconditions:
      - sh: test -n "{{.CLI_ARGS}}"
        msg: "Version required. Usage: task release -- v0.5.0"
      - sh: echo "{{.CLI_ARGS}}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'
        msg: "Version must match vX.Y.Z format (e.g. v0.5.0)"
      - sh: test "v{{.VERSION}}" = "{{.CLI_ARGS}}"
        msg: "Tag {{.CLI_ARGS}} does not match VERSION file (v{{.VERSION}}). Update VERSION first."
      - sh: test -z "$(git status --porcelain)"
        msg: "Working directory must be clean. Commit or stash changes first."
    cmds:
      - task: ci
      - task: build-binaries
      - git tag {{.CLI_ARGS}}
      - git push origin {{.CLI_ARGS}}
      - |
        gh release create {{.CLI_ARGS}} \
          {{.BUILD_DIR}}/pact-linux-x86_64 \
          {{.BUILD_DIR}}/pact-macos-x86_64 \
          {{.BUILD_DIR}}/pact-macos-aarch64 \
          llms-full.md \
          --title "{{.CLI_ARGS}}" \
          --generate-notes
      - echo "Released {{.CLI_ARGS}} — https://github.com/nhumrich/pact/releases/tag/{{.CLI_ARGS}}"
      - sed -i 's/pact_cli_version = "[^"]*"/pact_cli_version = "{{.VERSION}}"/' {{.BUILD_DIR}}/cli.c
      - cc -o {{.BUILD_DIR}}/pact {{.BUILD_DIR}}/cli.c -lm -lgc
      - mkdir -p ~/.local/bin
      - cp {{.BUILD_DIR}}/pact ~/.local/bin/pact
      - echo "Local pact updated to {{.VERSION}}"
