version: '3'

vars:
  BUILD_DIR: build
  PACTC: build/pactc

tasks:
  bootstrap:
    desc: Build compiler from bootstrap and verify self-hosting
    cmds:
      - ./bootstrap/bootstrap.sh

  compile-test:
    desc: "Compile a single test file (usage: task compile-test -- test_name)"
    cmds:
      - '{{.PACTC}} examples/{{.CLI_ARGS}}.pact {{.BUILD_DIR}}/{{.CLI_ARGS}}.c'
      - 'cc -o {{.BUILD_DIR}}/{{.CLI_ARGS}} {{.BUILD_DIR}}/{{.CLI_ARGS}}.c -lm'

  test:
    desc: Compile and run all test_*.pact files
    cmds:
      - |
        passed=0
        failed=0
        errors=""
        for f in examples/test_*.pact; do
          name=$(basename "$f" .pact)
          if ! {{.PACTC}} "$f" "{{.BUILD_DIR}}/${name}.c" 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (pactc) ${name}"
            continue
          fi
          if ! cc -o "{{.BUILD_DIR}}/${name}" "{{.BUILD_DIR}}/${name}.c" -lm 2>/dev/null; then
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (cc)    ${name}"
            continue
          fi
          if output=$({{.BUILD_DIR}}/${name} 2>&1); then
            if echo "$output" | grep -qi "FAIL"; then
              failed=$((failed + 1))
              errors="${errors}\n  FAIL (assert) ${name}"
            else
              passed=$((passed + 1))
            fi
          else
            failed=$((failed + 1))
            errors="${errors}\n  FAIL (crash)  ${name}"
          fi
        done
        echo "${passed} passed, ${failed} failed"
        if [ $failed -gt 0 ]; then
          printf "Failures:${errors}\n"
          exit 1
        fi

  ci:
    desc: Full CI — bootstrap + run all tests
    cmds:
      - task: bootstrap
      - task: test
