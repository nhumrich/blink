<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Most literal }> — two distinct glyphs composed to read as P -->
  <!-- Monospace-inspired, like you'd see in a terminal -->

  <!-- } character — large, navy -->
  <path d="M 130,60
           Q 170,60 170,100
           L 170,210
           Q 170,250 210,250
           Q 170,250 170,290
           L 170,400
           Q 170,440 130,440"
        fill="none" stroke="#1e3a5f" stroke-width="40" stroke-linecap="round"/>

  <!-- > character — smaller, gold, positioned to complete the P shape -->
  <!-- Sits right of the top half of the }, filling the "bowl" area -->
  <path d="M 220,100 L 330,170 L 220,240"
        fill="none" stroke="#d4930d" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
